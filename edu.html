<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celebrations</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f4f4f4;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .gallery img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }

        .gallery img:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>
    <div class="gallery">
        <img src="./images/Edutainment/HS3.jpg" alt="Sample 1">
        <img src="./images/Edutainment/HS4.jpg" alt="Sample 1">
        <img src="./images/Edutainment/MS.JPG" alt="Sample 1">
        <img src="./images/Edutainment/MS1.JPG" alt="Sample 1">
        <img src="./images/Edutainment/MS2.jpeg" alt="Sample 1">
        <img src="./images/Edutainment/MS3.jpeg" alt="Sample 1">
        <img src="./images/Edutainment/MS4.JPG" alt="Sample 1">
        <img src="./images/Edutainment/MS5.JPG" alt="Sample 1">




        



        

       












        














    </div>
</body>

</html>
