<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celebrations</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f4f4f4;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .gallery img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }

        .gallery img:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>
    <div class="gallery">
        <img src="./images/We Care/HS.JPG" alt="Sample 1">
        <img src="./images/We Care/HS1.JPG" alt="Sample 1">
        <img src="./images/We Care/HS2.JPG" alt="Sample 1">
        <img src="./images/We Care/HS3.JPG" alt="Sample 1">
        <img src="./images/We Care/MS.jpeg" alt="Sample 1">
        <img src="./images/We Care/MS1.jpeg" alt="Sample 1">
        <img src="./images/We Care/MS2.jpeg" alt="Sample 1">
        <img src="./images/We Care/MS3.jpeg" alt="Sample 1">
        <img src="./images/We Care/MS4.JPG" alt="Sample 1">
        <img src="./images/We Care/MS5.jpg" alt="Sample 1">
        <img src="./images/We Care/PP.jpeg" alt="Sample 1">
        <img src="./images/We Care/PP1.jpeg" alt="Sample 1">
        <img src="./images/We Care/PP2.jpeg" alt="Sample 1">
        <img src="./images/We Care/Pri.JPG" alt="Sample 1">
        <img src="./images/We Care/Pri1.JPG" alt="Sample 1">
        <img src="./images/We Care/Pri2.JPG" alt="Sample 1">
        <img src="./images/We Care/Pri3.jpg" alt="Sample 1">
















        

       












        














    </div>
</body>

</html>
